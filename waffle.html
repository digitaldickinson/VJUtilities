<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Waffle - Studio Quick Start</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    #autocue-display { scroll-behavior: auto; line-height: 2.2; scrollbar-width: none; }
    #autocue-display::-webkit-scrollbar { display: none; }

    .reading-line {
      border-top: 3px solid #38bdf8;
      position: absolute;
      top: 25%;
      left: 0;
      right: 0;
      pointer-events: none;
      z-index: 50;
      box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
    }

    #main-video {
      background: #111827;
      opacity: 1 !important;
      visibility: visible;
    }

    .recording-active { outline: 4px solid #ef4444; outline-offset: -4px; }

    #visual-countdown {
      display: none;
      position: absolute;
      inset: 0;
      z-index: 100;
      align-items: center;
      justify-content: center;
      font-size: 8rem;
      color: #38bdf8;
      font-weight: 800;
      background: #111827;
    }

    #help-modal { display: none; }

    video::-webkit-media-controls-enclosure {
      background: transparent !important;
      border-radius: 0;
    }

    video::-webkit-media-controls-panel {
      background: rgba(17, 24, 39, 0.15) !important;
    }
  </style>
</head>

<body class="bg-slate-800 text-slate-100 min-h-screen flex flex-col p-4 font-sans text-sm">

<div id="help-modal" class="fixed inset-0 z-[110] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4">
  <div class="bg-slate-800 border border-slate-700 rounded-2xl max-w-lg w-full p-6 shadow-2xl">
    <div class="flex justify-between items-center mb-4 border-b border-slate-700 pb-3">
      <h2 class="text-xl font-bold text-sky-400">Studio Guide</h2>
      <button id="close-help" class="text-slate-400 hover:text-white transition text-2xl">&times;</button>
    </div>
    <div class="space-y-4 text-slate-300">
      <p>1. <strong>Setup:</strong> Upload video and script.</p>
      <p>2. <strong>Rehearsing:</strong> Practice timing. Script scrolls with video.</p>
      <p>3. <strong>Recording:</strong> Start Take. 3s countdown, then recording begins.</p>
    </div>
    <button id="btn-got-it" class="w-full mt-6 bg-sky-600 hover:bg-sky-500 py-3 rounded-xl font-bold transition">Got it!</button>
  </div>
</div>

<header class="mb-4 flex justify-between items-center max-w-7xl mx-auto w-full border-b border-slate-700/60 pb-4">
  <div class="flex items-center gap-3">
    <svg class="w-10 h-10 text-amber-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="2" /><line x1="8" y1="3" x2="8" y2="21" /><line x1="16" y1="3" x2="16" y2="21" /><line x1="3" y1="8" x2="21" y2="8" /><line x1="3" y1="16" x2="21" y2="16" />
    </svg>
    <div>
      <h1 class="text-2xl font-bold text-sky-400 tracking-tight leading-none">Waffle</h1>
      <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mt-1">Studio Practice</p>
    </div>
  </div>

  <div class="flex items-center gap-4">
    <button id="open-help" class="text-slate-300 hover:text-sky-400 transition font-bold uppercase text-[10px] tracking-widest border border-slate-600 px-3 py-1 rounded-md">
      Help Guide
    </button>
  </div>
</header>

<main class="grid grid-cols-1 lg:grid-cols-2 gap-6 flex-grow max-w-7xl mx-auto w-full">
  <div class="flex flex-col gap-4">
    <div id="video-container" class="relative bg-slate-900 rounded-xl overflow-hidden aspect-video border border-slate-600 shadow-2xl flex items-center justify-center">
      <div id="visual-countdown">3</div>

      <video id="main-video" controls class="w-full h-full hidden z-[40] relative block"></video>

      <div id="video-placeholder" class="flex flex-col items-center justify-center text-slate-400 z-[10]">
        <input type="file" id="video-input" accept="video/*" class="text-xs cursor-pointer file:bg-sky-900 file:text-sky-100 file:border-0 file:rounded-full file:px-4 file:py-2 hover:file:bg-sky-800 transition"/>
        <p class="mt-2 text-[10px]">Upload Video</p>
      </div>
    </div>

    <div class="bg-slate-900/60 p-4 rounded-xl border border-slate-600 shadow-lg">
      <div class="flex gap-2">
        <button id="rec-btn" disabled class="flex-[2] bg-red-600 hover:bg-red-500 disabled:bg-slate-700 py-3 rounded-lg font-bold transition uppercase tracking-wider">Start Studio Take</button>
        <button id="rehearse-btn" disabled class="flex-1 bg-amber-600 hover:bg-amber-500 disabled:bg-slate-700 py-3 rounded-lg font-bold transition uppercase tracking-wider text-xs">Rehearse</button>
        <button id="stop-btn" class="flex-1 bg-slate-600 hover:bg-slate-500 py-3 rounded-lg font-bold transition uppercase tracking-wider text-xs">Stop</button>
      </div>

      <div class="flex gap-2 mt-2">
        <button id="new-video-btn" class="hidden flex-1 bg-slate-700 hover:bg-slate-600 py-2 rounded-lg font-bold transition uppercase tracking-widest text-[10px]">New Video</button>
        <button id="sync-play-btn" class="hidden flex-[2] bg-sky-600 hover:bg-sky-500 py-2 rounded-lg font-bold transition text-xs uppercase tracking-wider">Playback Take</button>
      </div>

      <div id="review-zone" class="mt-4 pt-4 border-t border-slate-700 hidden text-center">
        <audio id="audio-playback" class="w-full mb-2 h-8" controls></audio>
        <a id="download-link" class="text-sky-400 text-[10px] uppercase font-bold tracking-widest hover:underline">Download File</a>
      </div>
    </div>
  </div>

  <div class="flex flex-col gap-4">
    <div id="script-container" class="bg-slate-900/60 p-5 rounded-xl border border-slate-600 flex-grow flex flex-col shadow-xl">
      <div class="flex justify-between items-center mb-2">
        <label class="font-bold text-xs text-slate-300 uppercase tracking-wide">Script</label>
        <div id="speed-indicator" class="text-sky-400 text-[10px] font-mono font-bold uppercase">Scroll: 1.0</div>
      </div>
      <textarea id="script-input" class="w-full h-20 bg-slate-950 text-slate-300 p-3 rounded-lg mb-4 border border-slate-700 resize-none outline-none text-sm focus:border-sky-500" placeholder="Paste script..."></textarea>
      <div class="relative flex-grow bg-slate-950 rounded-lg overflow-hidden border border-black shadow-inner">
        <div class="reading-line"></div>
        <div id="autocue-display" class="p-8 h-[400px] overflow-y-auto text-3xl font-bold leading-relaxed whitespace-pre-wrap text-center text-slate-200">
          <span class="opacity-20 italic text-xl">Script Preview...</span>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
  const video = document.getElementById('main-video');
  const videoContainer = document.getElementById('video-container');
  const videoInput = document.getElementById('video-input');
  const scriptInput = document.getElementById('script-input');
  const autocue = document.getElementById('autocue-display');
  const visualCountdown = document.getElementById('visual-countdown');
  const recBtn = document.getElementById('rec-btn');
  const rehearseBtn = document.getElementById('rehearse-btn');
  const stopBtn = document.getElementById('stop-btn');
  const syncPlayBtn = document.getElementById('sync-play-btn');
  const newVideoBtn = document.getElementById('new-video-btn');
  const audioPlayback = document.getElementById('audio-playback');
  const speedIndicator = document.getElementById('speed-indicator');
  const downloadLink = document.getElementById('download-link');
  const helpModal = document.getElementById('help-modal');
  const openHelp = document.getElementById('open-help');
  const reviewZone = document.getElementById('review-zone');
  const scriptContainer = document.getElementById('script-container');

  let mediaRecorder = null;
  let audioChunks = [];
  let scrollSpeedMultiplier = 1.0;
  let activeStream = null;
  let audioUrl = null;
  let videoUrl = null;
  let countdownInterval = null;

  newVideoBtn.onclick = () => videoInput.click();

  openHelp.onclick = () => helpModal.style.display = 'flex';
  document.getElementById('close-help').onclick = () => helpModal.style.display = 'none';
  document.getElementById('btn-got-it').onclick = () => helpModal.style.display = 'none';

  videoInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) {
      if (videoUrl) URL.revokeObjectURL(videoUrl);
      videoUrl = URL.createObjectURL(file);
      video.src = videoUrl;
      video.classList.remove('hidden');
      document.getElementById('video-placeholder').style.display = 'none';
      newVideoBtn.classList.remove('hidden');
      
      visualCountdown.style.display = 'none';
      if (countdownInterval) clearInterval(countdownInterval);

      recBtn.disabled = false;
      rehearseBtn.disabled = false;
    }
  });

  scriptInput.addEventListener('input', (e) => {
    autocue.innerText = e.target.value.trim() || "Script Preview...";
  });

  video.ontimeupdate = () => {
    if (!video.duration) return;
    const progress = video.currentTime / video.duration;
    const maxScroll = autocue.scrollHeight - autocue.clientHeight;
    const raw = (progress * scrollSpeedMultiplier * autocue.scrollHeight) - (autocue.clientHeight * 0.25);
    autocue.scrollTop = Math.max(0, Math.min(raw, maxScroll));
  };

  window.addEventListener('keydown', (e) => {
    if (e.key === "ArrowUp") { e.preventDefault(); scrollSpeedMultiplier += 0.1; }
    if (e.key === "ArrowDown") { e.preventDefault(); scrollSpeedMultiplier -= 0.1; }
    speedIndicator.innerText = `Scroll: ${scrollSpeedMultiplier.toFixed(1)}`;
  });

  const startSequence = (isRehearsal) => {
    let count = 3;
    visualCountdown.style.display = 'flex';
    visualCountdown.innerText = count;

    countdownInterval = setInterval(() => {
      count--;
      if (count > 0) visualCountdown.innerText = count;
      else {
        clearInterval(countdownInterval);
        visualCountdown.style.display = 'none';
        if (!isRehearsal && mediaRecorder) {
           mediaRecorder.start();
           videoContainer.classList.add('recording-active');
        } else {
           scriptContainer.classList.add('rehearsing');
        }
        video.currentTime = 0;
        video.muted = isRehearsal ? false : true;
        video.play();
        recBtn.disabled = true;
        rehearseBtn.disabled = true;
      }
    }, 1000);
  };

  rehearseBtn.onclick = () => startSequence(true);

  recBtn.onclick = async () => {
    try {
      activeStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(activeStream);
      audioChunks = [];
      mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
      mediaRecorder.onstop = () => {
        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
        if (audioUrl) URL.revokeObjectURL(audioUrl);
        audioUrl = URL.createObjectURL(audioBlob);
        audioPlayback.src = audioUrl;
        downloadLink.href = audioUrl;
        downloadLink.download = "take.webm";
        reviewZone.classList.remove('hidden');
        syncPlayBtn.classList.remove('hidden');
        if (activeStream) activeStream.getTracks().forEach(t => t.stop());
      };
      startSequence(false);
    } catch (err) {
      alert("Mic required.");
    }
  };

  stopBtn.onclick = () => {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    clearInterval(countdownInterval);
    visualCountdown.style.display = 'none';
    
    video.pause();
    video.currentTime = 0;
    audioPlayback.pause();
    audioPlayback.currentTime = 0;

    recBtn.disabled = false;
    rehearseBtn.disabled = false;
    scriptContainer.classList.remove('rehearsing');
    videoContainer.classList.remove('recording-active');
  };

  syncPlayBtn.onclick = () => {
    video.currentTime = 0;
    audioPlayback.currentTime = 0;
    video.play();
    audioPlayback.play();
  };
</script>
</body>
</html>
