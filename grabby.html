<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Grabby: Pro Evidence Tool</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #172033;
      --muted: #5b6374;
      --accent: #2f6fed;
      --border: #d7dde7;
      --danger: #ef4444;
      --panel: #f8fafc;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Inter", system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 24px; }
    header { max-width: 1200px; margin: 0 auto 20px; display: flex; align-items: center; gap: 12px; }
    .logo { width: 44px; height: 44px; display: inline-flex; align-items: center; justify-content: center; }
    h1 { font-size: 1.6rem; margin: 0 0 6px; }
    .title-block { display: flex; flex-direction: column; gap: 2px; }
    p { margin: 0; color: var(--muted); }
    .app { max-width: 1200px; margin: 0 auto; background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; box-shadow: 0 10px 30px rgba(23, 32, 51, 0.08); }
    .file-drop { border: 2px dashed var(--border); border-radius: 12px; padding: 20px; text-align: center; background: #fdfdff; margin-bottom: 20px; }
    video { width: 100%; border-radius: 12px; background: #000; margin-bottom: 20px; border: 1px solid var(--border); }
    .toolbar { display: flex; align-items: stretch; gap: 20px; margin-bottom: 24px; flex-wrap: wrap; }
    .manual-controls { display: flex; flex-direction: column; justify-content: center; gap: 12px; padding-right: 20px; border-right: 1px solid var(--border); }
    .scuttle-panel { flex: 1; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px; display: flex; align-items: center; gap: 24px; min-width: 500px; }
    .scuttle-section { display: flex; flex-direction: column; gap: 4px; }
    .scuttle-title { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: var(--muted); letter-spacing: 0.05em; margin-bottom: 4px; }
    .button { border: 1px solid var(--border); background: #fff; color: var(--text); padding: 10px 18px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 0.9rem; transition: 0.2s; white-space: nowrap; }
    .button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .button.danger { color: var(--danger); border-color: var(--danger); }
    .timecode { font-variant-numeric: tabular-nums; font-size: 1.2rem; font-weight: 700; background: #101626; color: #fff; padding: 8px 16px; border-radius: 8px; text-align: center; }
    .progress-container { width: 100%; height: 6px; background: #eee; border-radius: 3px; margin-bottom: 20px; display: none; overflow: hidden; }
    .progress-fill { height: 100%; width: 0%; background: var(--accent); transition: width 0.1s; }
    .gallery-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 16px; }
    .badge { background: var(--accent); color: white; padding: 2px 8px; border-radius: 12px; font-size: 0.8rem; margin-left: 8px; }
    .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
    .thumb { background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 12px; display: flex; flex-direction: column; gap: 10px; position: relative; transition: transform 0.2s ease; cursor: grab; }
    .thumb.over { border: 2px solid var(--accent); transform: scale(1.02); }
    .thumb[draggable="true"] { user-select: none; }
    .thumb img { width: 100%; border-radius: 6px; cursor: pointer; border: 1px solid var(--border); }
    .thumb textarea { width: 100%; min-height: 70px; font-size: 0.85rem; border: 1px solid var(--border); border-radius: 6px; padding: 8px; font-family: inherit; resize: vertical; }
    .delete-btn { position: absolute; top: 18px; right: 18px; background: var(--danger); color: white; border: none; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; z-index: 5; font-weight: bold; }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <svg width="44" height="44" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="100" height="100" rx="20" fill="#F8FAFC" />
        <path d="M25 60C25 48.9543 36.1929 40 50 40C63.8071 40 75 48.9543 75 60C75 71.0457 63.8071 80 50 80C36.1929 80 25 71.0457 25 60Z" fill="#EF4444"/>
        <rect x="42" y="32" width="4" height="10" rx="2" fill="#EF4444"/><rect x="54" y="32" width="4" height="10" rx="2" fill="#EF4444"/>
        <circle cx="44" cy="32" r="3" fill="white"/><circle cx="56" cy="32" r="3" fill="white"/>
        <circle cx="44" cy="32" r="1.5" fill="#1E293B"/><circle cx="56" cy="32" r="1.5" fill="#1E293B"/>
        <path d="M25 55L15 50" stroke="#EF4444" stroke-width="4" stroke-linecap="round"/><path d="M25 65L15 70" stroke="#EF4444" stroke-width="4" stroke-linecap="round"/>
        <path d="M75 55L85 50" stroke="#EF4444" stroke-width="4" stroke-linecap="round"/><path d="M75 65L85 70" stroke="#EF4444" stroke-width="4" stroke-linecap="round"/>
        <path d="M20 25V15H30" stroke="#DC2626" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M20 15L28 35" stroke="#EF4444" stroke-width="5" stroke-linecap="round"/>
        <path d="M70 15H80V25" stroke="#DC2626" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M80 15L72 35" stroke="#EF4444" stroke-width="5" stroke-linecap="round"/>
        <rect x="20" y="15" width="60" height="50" rx="2" stroke="#94A3B8" stroke-width="1" stroke-dasharray="2 2" />
      </svg>
    </div>
    <div class="title-block">
      <h1>Grabby: Screenshot Tool</h1>
      <p>Scuttle, shuttle and screenshot video to generate evidence for reports and stroyboards.</p>
    </div>
  </header>

  <main class="app">
    <div class="file-drop" id="fileDrop">
      <input id="fileInput" type="file" accept="video/*" />
      <label for="fileInput" style="cursor:pointer; color:var(--accent); font-weight:600;">Load Video File</label> or drag & drop.
      <div id="fileName" style="font-size:0.8rem; margin-top:5px; color:var(--muted);">No file selected</div>
    </div>

    <div class="progress-container" id="pContainer"><div class="progress-fill" id="pFill"></div></div>

    <video id="video" controls></video>
    <canvas id="procCanvas" style="display:none;"></canvas>

    <section class="toolbar">
      <div class="manual-controls">
        <div class="timecode" id="timecode">00:00.00</div>
        <button class="button primary" id="captureBtn">Manual Capture (S)</button>
      </div>

      <div class="scuttle-panel">
        <div class="scuttle-section" style="border-right: 1px solid var(--border); padding-right: 20px;">
          <div class="scuttle-title">Scuttle Mode</div>
          <label style="display:flex; align-items:center; gap:8px; font-size:0.85rem; font-weight:600; cursor:pointer;">
            <input type="checkbox" id="fixedInterval"> Fixed 2s Interval
          </label>
        </div>

        <div class="scuttle-section" id="sensContainer" style="flex: 1;">
          <div class="scuttle-title">Scuttle Sensitivity</div>
          <div style="display:flex; align-items:center; gap:12px;">
            <input type="range" id="sens" min="1" max="100" step="1" value="71" style="flex:1; accent-color:var(--accent);">
            <span id="sensLabel" style="font-weight: 700; color: var(--accent); min-width: 65px;">Balanced</span>
          </div>
        </div>

        <button class="button" id="scuttleBtn" style="border-color:var(--accent); color:var(--accent);">Run Scuttle Scan</button>
      </div>
    </section>

    <div class="gallery-header">
      <div>
        <strong>Evidence Gallery</strong><span class="badge" id="countBadge">0 Shots</span>
      </div>
      <div style="display:flex; gap:8px;">
        <button class="button" id="zipBtn">Download ZIP</button>
        <button class="button" id="wordBtn">Word Report</button>
        <button class="button danger" id="clearBtn">Clear Gallery</button>
      </div>
    </div>
    <div class="gallery" id="gallery"></div>
  </main>

  <script>
    const video = document.getElementById("video");
    const fileInput = document.getElementById("fileInput");
    const gallery = document.getElementById("gallery");
    const countBadge = document.getElementById("countBadge");
    const procCanvas = document.getElementById("procCanvas");
    const pCtx = procCanvas.getContext("2d", { willReadFrequently: true });
    const pFill = document.getElementById("pFill");
    const pContainer = document.getElementById("pContainer");
    const scuttleBtn = document.getElementById("scuttleBtn");
    const sensInput = document.getElementById("sens");
    const sensLabel = document.getElementById("sensLabel");
    const fixedIntervalCheck = document.getElementById("fixedInterval");
    const sensContainer = document.getElementById("sensContainer");

    let shuttleRates = [1, 2, 4, 8, 16], shuttleIdx = 0, shuttleDir = 0, revTimer = null;
    let dragSrcEl = null;

    fileInput.onchange = (e) => {
      const file = e.target.files[0];
      if (file) { video.src = URL.createObjectURL(file); document.getElementById("fileName").textContent = file.name; }
    };

    fixedIntervalCheck.onchange = () => {
        sensContainer.style.opacity = fixedIntervalCheck.checked ? "0.3" : "1";
        sensContainer.style.pointerEvents = fixedIntervalCheck.checked ? "none" : "auto";
    };

    sensInput.oninput = () => {
        const val = parseInt(sensInput.value);
        if (val <= 40) sensLabel.innerText = "Lowest";
        else if (val <= 70) sensLabel.innerText = "Lower";
        else if (val >= 71 && val <= 85) sensLabel.innerText = "Balanced";
        else sensLabel.innerText = "High";
    };

    const setupDragEvents = (el) => {
      el.addEventListener('dragstart', function(e) {
        dragSrcEl = this;
        e.dataTransfer.effectAllowed = 'move';
        this.style.opacity = '0.4';
      });
      el.addEventListener('dragend', function() {
        this.style.opacity = '1';
        gallery.querySelectorAll('.thumb').forEach(t => t.classList.remove('over'));
      });
      el.addEventListener('dragover', function(e) {
        if (e.preventDefault) e.preventDefault();
        return false;
      });
      el.addEventListener('dragenter', function() { this.classList.add('over'); });
      el.addEventListener('dragleave', function() { this.classList.remove('over'); });
      el.addEventListener('drop', function(e) {
        e.stopPropagation();
        if (dragSrcEl !== this) {
          const rect = this.getBoundingClientRect();
          const next = (e.clientX - rect.left) > (rect.width / 2);
          gallery.insertBefore(dragSrcEl, next ? this.nextSibling : this);
        }
        return false;
      });
    };

    const addThumbnail = (dataUrl, tc, rawTime) => {
      const thumb = document.createElement("div");
      thumb.className = "thumb";
      thumb.draggable = true;
      thumb.innerHTML = `
        <button class="delete-btn">✕</button>
        <img src="${dataUrl}" onclick="document.getElementById('video').currentTime = ${rawTime}">
        <small style="font-weight:bold;">Timecode: ${tc}</small>
        <textarea placeholder="Observations..." onkeydown="event.stopPropagation()"></textarea>
      `;

      thumb.querySelector('.delete-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        URL.revokeObjectURL(dataUrl);
        thumb.remove();
        updateBadge();
      });

      setupDragEvents(thumb);
      gallery.appendChild(thumb);
      updateBadge();
    };

    const captureScreenshot = () => {
      if (!video.videoWidth) return;
      const canvas = document.createElement("canvas");
      canvas.width = video.videoWidth; canvas.height = video.videoHeight;
      canvas.getContext("2d").drawImage(video, 0, 0);
      canvas.toBlob((blob) => {
        addThumbnail(URL.createObjectURL(blob), formatTC(video.currentTime), video.currentTime);
      }, 'image/jpeg', 0.85);
    };

    document.getElementById("captureBtn").onclick = captureScreenshot;

    const formatTC = (seconds) => {
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      const ms = Math.floor((seconds - Math.floor(seconds)) * 100);
      return `${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}.${String(ms).padStart(2, "0")}`;
    };

    const updateBadge = () => {
      const count = gallery.querySelectorAll(".thumb").length;
      countBadge.textContent = `${count} Shot${count === 1 ? '' : 's'}`;
    };

    const getLumaHist = () => {
      procCanvas.width = 32; procCanvas.height = 32;
      pCtx.drawImage(video, 0, 0, 32, 32);
      const data = pCtx.getImageData(0, 0, 32, 32).data, bins = 64, hist = new Array(bins).fill(0);
      for (let i = 0; i < data.length; i += 4) {
        const luma = (0.299 * data[i]) + (0.587 * data[i+1]) + (0.114 * data[i+2]);
        hist[Math.floor(luma / (256/bins))]++;
      }
      return hist.map(v => v / 1024);
    };

    const compare = (h1, h2) => h1.reduce((acc, v, i) => acc + Math.abs(v - h2[i]), 0);
    const seek = (t) => new Promise(r => {
      const cb = () => { video.removeEventListener('seeked', cb); r(); };
      video.addEventListener('seeked', cb);
      video.currentTime = Math.max(0, Math.min(t, video.duration - 0.1));
    });

    const stopShuttle = () => { if (revTimer) clearInterval(revTimer); revTimer = null; shuttleDir = 0; shuttleIdx = 0; video.playbackRate = 1; video.pause(); };
    const startShuttleForward = () => { if (revTimer) clearInterval(revTimer); shuttleDir = 1; shuttleIdx = Math.min(shuttleIdx + 1, shuttleRates.length - 1); video.playbackRate = shuttleRates[shuttleIdx]; video.play(); };
    const startShuttleReverse = () => { shuttleDir = -1; shuttleIdx = Math.min(shuttleIdx + 1, shuttleRates.length - 1); video.pause(); if (revTimer) clearInterval(revTimer); revTimer = setInterval(() => { video.currentTime -= (shuttleRates[shuttleIdx] * 0.1); if (video.currentTime <= 0) stopShuttle(); }, 100); };

    scuttleBtn.onclick = async () => {
      if (!video.src) return;
      scuttleBtn.disabled = true; pContainer.style.display = "block";
      const useFixed = fixedIntervalCheck.checked, scout = 0.4, fine = 0.04, cooldown = 2.0;
      let meanDiff = 0.15, alpha = 0.15;
      const mult = 6.0 - (parseInt(sensInput.value) / 100) * 4.5;
      
      await seek(0); captureScreenshot();
      let prevHist = useFixed ? null : getLumaHist();

      for (let t = scout; t < video.duration; t += scout) {
        pFill.style.width = `${(t / video.duration) * 100}%`;
        await seek(t);
        if (useFixed) {
          captureScreenshot();
          t += 1.6;
        } else {
          const currHist = getLumaHist(), diff = compare(prevHist, currHist);
          if (diff > meanDiff * mult) {
            for (let f = t - scout + fine; f <= t; f += fine) {
              await seek(f);
              if (compare(prevHist, getLumaHist()) > meanDiff * mult) {
                captureScreenshot();
                t = f + cooldown; await seek(t);
                prevHist = getLumaHist();
                break;
              }
            }
          } else {
            meanDiff = (alpha * diff) + (1 - alpha) * meanDiff;
            prevHist = currHist;
          }
        }
      }
      pContainer.style.display = "none"; scuttleBtn.disabled = false;
    };

    // --- FIXED: True ZIP Archiving using JSZip ---
    document.getElementById("zipBtn").onclick = async () => {
      const thumbs = Array.from(gallery.querySelectorAll(".thumb"));
      if (!thumbs.length) return alert("Add evidence first.");
      
      const zip = new JSZip();
      const folder = zip.folder("evidence_images");
      
      for (const thumb of thumbs) {
        const img = thumb.querySelector("img");
        const tc = thumb.querySelector('small').innerText.split(': ')[1].replace(/[:.]/g, '-');
        const response = await fetch(img.src);
        const blob = await response.blob();
        folder.file(`Shot_${tc}.jpg`, blob);
      }
      
      const content = await zip.generateAsync({type: "blob"});
      const link = document.createElement("a");
      link.href = URL.createObjectURL(content);
      link.download = "Evidence_Bundle.zip";
      link.click();
    };

    // --- FIXED: Word Report with Embedded Images ---
    document.getElementById("wordBtn").onclick = async () => {
      const thumbs = Array.from(gallery.querySelectorAll(".thumb"));
      if (!thumbs.length) return alert("Add evidence first.");

      let sections = [];
      for (const t of thumbs) {
        const img = t.querySelector("img");
        const tc = t.querySelector('small').innerText.split(': ')[1];
        const note = t.querySelector("textarea").value || "N/A";
        
        // Convert Blob URL to Base64 for embedding
        const response = await fetch(img.src);
        const blob = await response.blob();
        const base64 = await new Promise(r => {
          const reader = new FileReader();
          reader.onloadend = () => r(reader.result);
          reader.readAsDataURL(blob);
        });

        sections.push(`
          <div style="margin-bottom:40px; page-break-inside:avoid;">
            <img src="${base64}" width="500" style="border:1px solid #ccc;"><br>
            <p style="font-family:sans-serif; font-size:14px;"><b>Timecode:</b> ${tc}<br>
            <b>Observation:</b> ${note}</p>
          </div>`);
      }

      const content = `<html><body style="padding:40px;">
        <h1 style="color:#2f6fed; font-family:sans-serif;">Evidence Gallery Report</h1>
        ${sections.join('')}</body></html>`;
      
      const blob = new Blob([content], {type: 'application/msword'});
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "Evidence_Report.doc";
      a.click();
    };

    document.getElementById("clearBtn").onclick = () => { if(confirm("Clear all?")) { gallery.innerHTML = ""; updateBadge(); } };
    video.ontimeupdate = () => { document.getElementById("timecode").textContent = formatTC(video.currentTime); };

    window.addEventListener("keydown", (e) => {
        if (['TEXTAREA', 'INPUT'].includes(document.activeElement.tagName)) return;
        const key = e.key.toLowerCase();
        if (key === 's') { e.preventDefault(); captureScreenshot(); }
        if (key === 'j') { e.preventDefault(); startShuttleReverse(); }
        if (key === 'k') { e.preventDefault(); stopShuttle(); }
        if (key === 'l') { e.preventDefault(); startShuttleForward(); }
        if (e.key === 'ArrowLeft') { e.preventDefault(); stopShuttle(); video.currentTime -= 0.04; }
        if (e.key === 'ArrowRight') { e.preventDefault(); stopShuttle(); video.currentTime += 0.04; }
        if (e.code === 'Space') { e.preventDefault(); stopShuttle(); video.paused ? video.play() : video.pause(); }
    });
  </script>
</body>
</html>
